<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main}, 'Manage Reviews')}">
<main>
  <style>
    :root{--g:#c8841f;--gd:#8a5c0c;--gl:#e8a94a;--gp:#fdf4e3;--gpp:#f0d898;--dk:#1a1208;--bd:#3d2e14;--mu:#7a6444;--wh:#fff;--of:#faf7f2;--br:#e8dfc9;}
    .ar-wrap{max-width:1100px;margin:0 auto;padding:36px 36px 72px;font-family:'Jost',sans-serif;}

    /* Header */
    .ar-hd{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap;}
    .ar-title-tag{font-size:.63rem;letter-spacing:5px;text-transform:uppercase;color:var(--g);font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:10px;}
    .ar-title-tag::before{content:'';width:26px;height:2px;background:linear-gradient(90deg,var(--gd),var(--g));border-radius:2px;}
    .ar-title{font-family:'Cinzel',serif;font-size:1.8rem;font-weight:700;color:var(--dk);}

    /* Filter tabs */
    .ar-tabs{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap;}
    .ar-tab{display:inline-flex;align-items:center;gap:7px;padding:8px 18px;border-radius:8px;text-decoration:none;font-size:.83rem;font-weight:700;font-family:'Jost',sans-serif;transition:.2s;border:1.5px solid var(--br);background:var(--wh);color:var(--mu);}
    .ar-tab:hover{border-color:var(--g);color:var(--g);background:var(--gp);}
    .ar-tab.active{background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;border-color:var(--g);box-shadow:0 3px 10px rgba(200,132,31,.28);}
    .ar-tab .cnt{background:rgba(255,255,255,.25);border-radius:20px;padding:1px 8px;font-size:.7rem;}
    .ar-tab:not(.active) .cnt{background:var(--of);color:var(--mu);border:1px solid var(--br);}

    /* Review card */
    .ar-card{background:var(--wh);border:1px solid var(--br);border-radius:14px;margin-bottom:14px;overflow:hidden;box-shadow:0 3px 14px rgba(0,0,0,.06);transition:.25s;}
    .ar-card:hover{box-shadow:0 7px 26px rgba(0,0,0,.10);border-color:rgba(200,132,31,.18);}

    .ar-card-hd{background:var(--of);padding:14px 22px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
    .ar-user{display:flex;align-items:center;gap:10px;}
    .ar-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gd),var(--g));display:flex;align-items:center;justify-content:center;color:#fff;font-size:.85rem;font-weight:700;font-family:'Cinzel',serif;flex-shrink:0;}
    .ar-uname{font-weight:700;color:var(--dk);font-size:.88rem;}
    .ar-meta{font-size:.74rem;color:var(--mu);}
    .ar-stars{color:var(--g);font-size:.95rem;letter-spacing:2px;}
    .ar-rbadge{background:var(--gp);border:1px solid var(--gpp);color:var(--gd);border-radius:6px;padding:3px 9px;font-size:.72rem;font-weight:700;}

    /* Status pill */
    .ar-status{display:inline-flex;align-items:center;gap:5px;border-radius:20px;padding:4px 12px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
    .ar-status.pending  {background:#fff8f0;border:1px solid #f0c898;color:#8a5c0c;}
    .ar-status.approved {background:#edfaf3;border:1px solid #a8e6c5;color:#1a5a30;}
    .ar-status.hidden   {background:#fff4f4;border:1px solid #f5b8b8;color:#a31515;}
    .ar-status-dot{width:6px;height:6px;border-radius:50%;}
    .pending  .ar-status-dot{background:#e67e22;}
    .approved .ar-status-dot{background:#27ae60;}
    .hidden   .ar-status-dot{background:#e74c3c;}

    /* Card body */
    .ar-card-body{padding:18px 22px;}
    .ar-product{display:inline-flex;align-items:center;gap:6px;background:var(--gp);border:1px solid var(--gpp);color:var(--gd);border-radius:6px;padding:4px 11px;font-size:.74rem;font-weight:700;margin-bottom:11px;}
    .ar-comment{font-size:.91rem;color:var(--bd);line-height:1.75;}
    .ar-vbadge{display:inline-flex;align-items:center;gap:5px;background:#edfaf3;border:1px solid #a8e6c5;color:#1a5a30;border-radius:20px;padding:4px 12px;font-size:.7rem;font-weight:700;margin-top:10px;letter-spacing:.3px;}

    /* Actions */
    .ar-actions{display:flex;gap:8px;flex-wrap:wrap;padding:14px 22px;border-top:1px solid var(--br);background:var(--of);}
    .btn-ar{display:inline-flex;align-items:center;gap:6px;padding:7px 15px;border-radius:7px;font-size:.8rem;font-weight:700;font-family:'Jost',sans-serif;cursor:pointer;transition:.2s;border:none;}
    .btn-approve{background:#edfaf3;border:1px solid #a8e6c5;color:#1a5a30;}
    .btn-approve:hover{background:#c8f0da;}
    .btn-reject {background:#fff8f0;border:1px solid #f0c898;color:#8a5c0c;}
    .btn-reject:hover{background:#f0c898;}
    .btn-delete {background:#fff4f4;border:1px solid #f5b8b8;color:#a31515;}
    .btn-delete:hover{background:#f5b8b8;}

    /* Empty */
    .ar-empty{text-align:center;padding:56px 24px;background:var(--of);border-radius:16px;border:1px dashed var(--br);}
    .ar-empty i{font-size:3rem;color:#d8cbb8;margin-bottom:14px;display:block;}
    .ar-empty-t{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--dk);margin-bottom:7px;}

    @media(max-width:640px){.ar-wrap{padding:20px 14px 52px;}}
  </style>

  <div class="ar-wrap">

    <!-- Header -->
    <div class="ar-hd">
      <div>
        <div class="ar-title-tag">Admin Moderation</div>
        <h1 class="ar-title"><i class="bi bi-star-half" style="color:var(--g)"></i> Manage Reviews</h1>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <a th:href="@{/admin/reviews/reports}"
           style="display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border:1.5px solid #f5b8b8;border-radius:8px;color:#a31515;text-decoration:none;font-size:.83rem;font-weight:700;background:#fff4f4;">
          <i class="bi bi-flag-fill"></i> Reports
          <span th:if="${pendingReportCount > 0}"
                style="background:#e74c3c;color:#fff;border-radius:20px;padding:1px 8px;font-size:.7rem;"
                th:text="${pendingReportCount}">0</span>
        </a>
        <a th:href="@{/admin/dashboard}"
           style="display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border:1.5px solid var(--br);border-radius:8px;color:var(--mu);text-decoration:none;font-size:.83rem;font-weight:600;background:var(--wh);">
          <i class="bi bi-speedometer2"></i> Dashboard
        </a>
      </div>
    </div>

    <!-- Flash messages -->
    <div th:if="${success}" style="padding:12px 18px;background:#edfaf3;border:1px solid #a8e6c5;border-radius:10px;color:#1a5a30;font-size:.88rem;margin-bottom:18px;display:flex;align-items:center;gap:9px;">
      <i class="bi bi-check-circle-fill"></i><span th:text="${success}"></span>
    </div>
    <div th:if="${error}" style="padding:12px 18px;background:#fff4f4;border:1px solid #f5b8b8;border-radius:10px;color:#a31515;font-size:.88rem;margin-bottom:18px;display:flex;align-items:center;gap:9px;">
      <i class="bi bi-exclamation-circle-fill"></i><span th:text="${error}"></span>
    </div>

    <!-- Filter tabs -->
    <div class="ar-tabs">
      <a th:href="@{/admin/reviews(filter='pending')}"
         th:class="${filter == 'pending'} ? 'ar-tab active' : 'ar-tab'">
        <i class="bi bi-hourglass-split"></i> Pending
        <span class="cnt" th:text="${pendingCount}">0</span>
      </a>
      <a th:href="@{/admin/reviews(filter='approved')}"
         th:class="${filter == 'approved'} ? 'ar-tab active' : 'ar-tab'">
        <i class="bi bi-check-circle"></i> Approved
        <span class="cnt" th:text="${approvedCount}">0</span>
      </a>
      <a th:href="@{/admin/reviews(filter='all')}"
         th:class="${filter == 'all'} ? 'ar-tab active' : 'ar-tab'">
        <i class="bi bi-list-ul"></i> All Reviews
      </a>
    </div>

    <!-- Empty state -->
    <div class="ar-empty" th:if="${#lists.isEmpty(reviews)}">
      <i class="bi bi-chat-square-dots"></i>
      <div class="ar-empty-t"
           th:text="${filter == 'pending'} ? 'No Pending Reviews' : 'No Reviews Found'">
        No Reviews Found
      </div>
      <p style="font-size:.88rem;color:var(--mu);"
         th:text="${filter == 'pending'} ? 'All reviews have been moderated.' : 'There are no reviews matching this filter.'">
      </p>
    </div>

    <!-- Review cards -->
    <div th:each="r : ${reviews}" class="ar-card">

      <!-- Card header: user info + stars + status -->
      <div class="ar-card-hd">
        <div class="ar-user">
          <div class="ar-av"
               th:text="${r.user.fullName != null and !r.user.fullName.isBlank()}
                        ? ${r.user.fullName.substring(0,1).toUpperCase()} : 'U'">U</div>
          <div>
            <div class="ar-uname" th:text="${r.user.fullName}">Customer</div>
            <div class="ar-meta">
              <i class="bi bi-envelope" style="color:var(--g);margin-right:3px"></i>
              <span th:text="${r.user.email}">email@example.com</span>
              &nbsp;·&nbsp;
              <i class="bi bi-calendar3" style="margin-right:3px"></i>
              <span th:text="${#temporals.format(r.createdAt,'dd MMM yyyy, hh:mm a')}">Date</span>
            </div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <div class="ar-stars"
               th:text="${'★'.repeat(r.rating)} + ${'☆'.repeat(5 - r.rating)}">★★★★★</div>
          <div class="ar-rbadge" th:text="${r.rating} + ' / 5'">5 / 5</div>
          <!-- Status pill -->
          <div th:if="${!r.approved and !r.deleted}"   class="ar-status pending">
            <span class="ar-status-dot"></span>Pending
          </div>
          <div th:if="${r.approved and !r.deleted}"    class="ar-status approved">
            <span class="ar-status-dot"></span>Approved
          </div>
          <div th:if="${r.deleted}"                    class="ar-status hidden">
            <span class="ar-status-dot"></span>Hidden
          </div>
        </div>
      </div>

      <!-- Card body: product + comment -->
      <div class="ar-card-body">
        <div class="ar-product" th:if="${r.product != null}">
          <i class="bi bi-box"></i>
          <span th:text="${r.product.brand + ' ' + r.product.name}">Product</span>
        </div>
        <p class="ar-comment" th:text="${r.comment}">Review text here.</p>
        <div class="ar-vbadge" th:if="${r.verifiedPurchase}">
          <i class="bi bi-patch-check-fill"></i>Verified Purchase
        </div>
      </div>

      <!-- Action buttons -->
      <div class="ar-actions">

        <!-- APPROVE -->
        <form th:if="${!r.approved or r.deleted}"
              th:action="@{/admin/reviews/{id}/approve(id=${r.id})}" method="post"
              style="display:inline">
          <input type="hidden" name="filter" th:value="${filter}">
          <button type="submit" class="btn-ar btn-approve">
            <i class="bi bi-check-circle-fill"></i>Approve
          </button>
        </form>

        <!-- REJECT / HIDE -->
        <form th:if="${r.approved and !r.deleted}"
              th:action="@{/admin/reviews/{id}/reject(id=${r.id})}" method="post"
              style="display:inline">
          <input type="hidden" name="filter" th:value="${filter}">
          <button type="submit" class="btn-ar btn-reject">
            <i class="bi bi-eye-slash"></i>Hide
          </button>
        </form>

        <!-- DELETE (permanent) -->
        <form th:action="@{/admin/reviews/{id}/delete(id=${r.id})}" method="post"
              style="display:inline"
              onsubmit="return confirm('Permanently delete this review? This cannot be undone.')">
          <input type="hidden" name="filter" th:value="${filter}">
          <button type="submit" class="btn-ar btn-delete">
            <i class="bi bi-trash3"></i>Delete
          </button>
        </form>

      </div>
    </div>
    <!-- end each -->

  </div>
</main>
</html>
