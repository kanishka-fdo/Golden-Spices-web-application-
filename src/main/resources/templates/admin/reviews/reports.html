<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main}, 'Review Reports')}">
<main>
    <style>
        :root{--g:#c8841f;--gd:#8a5c0c;--gl:#e8a94a;--gp:#fdf4e3;--gpp:#f0d898;--dk:#1a1208;--bd:#3d2e14;--mu:#7a6444;--wh:#fff;--of:#faf7f2;--br:#e8dfc9;}
        .rp-wrap{max-width:1100px;margin:0 auto;padding:36px 36px 72px;font-family:'Jost',sans-serif;}
        .rp-hd{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;gap:12px;flex-wrap:wrap;}
        .rp-title-tag{font-size:.63rem;letter-spacing:5px;text-transform:uppercase;color:var(--g);font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:10px;}
        .rp-title-tag::before{content:'';width:26px;height:2px;background:linear-gradient(90deg,var(--gd),var(--g));border-radius:2px;}
        .rp-title{font-family:'Cinzel',serif;font-size:1.8rem;font-weight:700;color:var(--dk);}
        .pending-badge{background:#e74c3c;color:#fff;border-radius:20px;padding:5px 16px;font-size:.8rem;font-weight:700;}

        /* Report card */
        .rp-card{background:var(--wh);border:1px solid var(--br);border-radius:16px;margin-bottom:16px;overflow:hidden;box-shadow:0 3px 14px rgba(0,0,0,.06);transition:.25s;}
        .rp-card:hover{box-shadow:0 7px 28px rgba(0,0,0,.10);border-color:rgba(200,132,31,.18);}
        .rp-card-hd{background:var(--of);padding:16px 22px;border-bottom:1px solid var(--br);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
        .rp-reporter{font-size:.84rem;color:var(--bd);display:flex;align-items:center;gap:7px;}
        .rp-reporter strong{color:var(--dk);}
        .rp-date{font-size:.76rem;color:var(--mu);}
        .reason-badge{background:var(--gp);border:1px solid var(--gpp);color:var(--gd);border-radius:6px;padding:4px 12px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}

        .rp-body{padding:20px 22px;}
        /* The reported review */
        .review-box{background:var(--of);border:1px solid var(--br);border-radius:10px;padding:16px 18px;margin-bottom:16px;}
        .review-box-hd{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
        .rv-av{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--gd),var(--g));display:flex;align-items:center;justify-content:center;color:#fff;font-size:.85rem;font-weight:700;font-family:'Cinzel',serif;flex-shrink:0;}
        .rv-uname{font-weight:700;color:var(--dk);font-size:.88rem;}
        .rv-stars{color:var(--g);font-size:.88rem;letter-spacing:2px;}
        .rv-product{font-size:.76rem;color:var(--mu);}
        .rv-comment{font-size:.88rem;color:var(--bd);line-height:1.7;}
        .rp-note-box{background:#fff8f0;border:1px solid #f0c898;border-radius:8px;padding:11px 14px;margin-bottom:16px;font-size:.85rem;color:var(--bd);}
        .rp-note-box strong{color:var(--gd);}

        /* Action buttons */
        .rp-actions{display:flex;gap:9px;flex-wrap:wrap;}
        .btn-rp{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:.81rem;font-weight:700;font-family:'Jost',sans-serif;cursor:pointer;transition:.2s;border:none;}
        .btn-resolve{background:var(--gp);border:1px solid var(--gpp);color:var(--gd);}
        .btn-resolve:hover{background:var(--gpp);}
        .btn-hide{background:#fff8f0;border:1px solid #f0c898;color:#8a5c0c;}
        .btn-hide:hover{background:#f0c898;}
        .btn-delete{background:#fff4f4;border:1px solid #f5b8b8;color:#a31515;}
        .btn-delete:hover{background:#f5b8b8;}

        /* Empty */
        .rp-empty{text-align:center;padding:60px 24px;background:var(--of);border-radius:16px;border:1px dashed var(--br);}
        .rp-empty i{font-size:3rem;color:#d8cbb8;margin-bottom:14px;display:block;}
        .rp-empty-t{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--dk);margin-bottom:7px;}

        @media(max-width:640px){.rp-wrap{padding:20px 14px 52px;}}
    </style>

    <div class="rp-wrap">
        <div class="rp-hd">
            <div>
                <div class="rp-title-tag">Admin Moderation</div>
                <h1 class="rp-title"><i class="bi bi-flag" style="color:var(--g)"></i> Review Reports</h1>
            </div>
            <span class="pending-badge" th:if="${pendingCount > 0}">
      <i class="bi bi-exclamation-triangle-fill"></i>
      <span th:text="${pendingCount}">0</span> Pending
    </span>
        </div>

        <!-- Empty -->
        <div class="rp-empty" th:if="${#lists.isEmpty(reports)}">
            <i class="bi bi-check2-all"></i>
            <div class="rp-empty-t">No Pending Reports</div>
            <p style="font-size:.88rem;color:var(--mu)">All review reports have been resolved.</p>
        </div>

        <!-- Report cards -->
        <div th:each="rpt : ${reports}" class="rp-card">

            <div class="rp-card-hd">
                <div class="rp-reporter">
                    <i class="bi bi-person-fill" style="color:var(--g)"></i>
                    Reported by <strong th:text="${rpt.reportedBy.fullName}">User</strong>
                </div>
                <span class="reason-badge" th:text="${rpt.reason}">SPAM</span>
                <div class="rp-date">
                    <i class="bi bi-calendar3"></i>
                    <span th:text="${#temporals.format(rpt.createdAt,'dd MMM yyyy, hh:mm a')}">Date</span>
                </div>
            </div>

            <div class="rp-body">
                <!-- The reported review -->
                <div class="review-box">
                    <div class="review-box-hd">
                        <div class="rv-av"
                             th:text="${rpt.review.user.fullName != null} ? ${rpt.review.user.fullName.substring(0,1).toUpperCase()} : 'U'">U</div>
                        <div>
                            <div class="rv-uname" th:text="${rpt.review.user.fullName}">Reviewer</div>
                            <div class="rv-stars"
                                 th:text="${'★'.repeat(rpt.review.rating)} + ${'☆'.repeat(5 - rpt.review.rating)}">★★★★★</div>
                        </div>
                        <div class="rv-product" th:if="${rpt.review.product != null}">
                            <i class="bi bi-box" style="color:var(--g)"></i>
                            <span th:text="${rpt.review.product.name}">Product</span>
                        </div>
                    </div>
                    <p class="rv-comment" th:text="${rpt.review.comment}">Review comment.</p>
                </div>

                <!-- Reporter note -->
                <div class="rp-note-box" th:if="${rpt.note != null and !rpt.note.isBlank()}">
                    <strong>Reporter's Note:</strong>
                    <span th:text="${rpt.note}">Note</span>
                </div>

                <!-- Actions -->
                <div class="rp-actions">
                    <form th:action="@{/admin/reviews/reports/{id}/resolve(id=${rpt.id})}" method="post" style="display:inline">
                        <button type="submit" class="btn-rp btn-resolve">
                            <i class="bi bi-check-circle"></i> Mark Resolved
                        </button>
                    </form>
                    <form th:action="@{/admin/reviews/reports/{id}/hide(id=${rpt.id})}" method="post" style="display:inline">
                        <button type="submit" class="btn-rp btn-hide">
                            <i class="bi bi-eye-slash"></i> Hide Review
                        </button>
                    </form>
                    <form th:action="@{/admin/reviews/reports/{id}/delete(id=${rpt.id})}" method="post" style="display:inline"
                          onsubmit="return confirm('Permanently delete this review?')">
                        <button type="submit" class="btn-rp btn-delete">
                            <i class="bi bi-trash3"></i> Delete Review
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Back -->
        <div style="margin-top:28px">
            <a th:href="@{/admin/dashboard}" style="display:inline-flex;align-items:center;gap:7px;color:var(--mu);text-decoration:none;font-size:.84rem;font-weight:600;">
                <i class="bi bi-arrow-left"></i> Back to Admin Dashboard
            </a>
        </div>
    </div>
</main>
</html>
