<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main}, 'Manage Products')}">

<main>
    <div class="container-fluid">

        <!-- HEADER -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="bi bi-box-seam"></i> Manage Products</h2>
            <div>
                <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary me-2">
                    <i class="bi bi-arrow-left"></i> Dashboard
                </a>
                <a th:href="@{/admin/products/new}" class="btn btn-primary">
                    <i class="bi bi-plus-circle"></i> Add Product
                </a>
            </div>
        </div>

        <div class="card border-0 shadow-sm">
            <div class="card-body">

                <div class="table-responsive">

                    <table class="table table-hover align-middle"
                           th:if="${products != null and !products.isEmpty()}">

                        <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Product</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Inventory Status</th>
                            <th>Active</th>
                            <th>Actions</th>
                        </tr>
                        </thead>

                        <tbody>

                        <tr th:each="product : ${products}">

                            <!-- ID -->
                            <td th:text="${product.id}"></td>

                            <!-- PRODUCT -->
                            <td>
                                <strong th:text="${product.brand + ' ' + product.name}"></strong><br>
                                <small class="text-muted"
                                       th:text="${product.sizeLabel}"></small>
                            </td>

                            <!-- PRICE -->
                            <td>
                                <strong class="text-primary"
                                        th:text="'LKR ' + ${#numbers.formatDecimal(product.priceLkr,0,2)}">
                                </strong>
                            </td>

                            <!-- STOCK QTY -->
                            <td>
                                <span th:text="${product.stockQty}"></span> units
                            </td>

                            <!-- INVENTORY STATUS -->
                            <td>

                                <!-- OUT OF STOCK -->
                                <span class="badge bg-danger"
                                      th:if="${product.stockQty == 0}">
                                    Out of Stock
                                </span>

                                <!-- LOW STOCK -->
                                <span class="badge bg-warning text-dark"
                                      th:if="${product.stockQty > 0 and product.stockQty <= 5}">
                                    Low Stock
                                </span>

                                <!-- HEALTHY STOCK -->
                                <span class="badge bg-success"
                                      th:if="${product.stockQty > 5}">
                                    In Stock
                                </span>

                            </td>

                            <!-- ACTIVE STATUS -->
                            <td>
                                <form th:action="@{/admin/products/{id}/toggle-active(id=${product.id})}"
                                      method="post"
                                      class="d-inline">

                                    <button type="submit"
                                            class="badge border-0"
                                            th:classappend="${product.active} ? 'bg-success' : 'bg-secondary'"
                                            th:text="${product.active} ? 'Active' : 'Inactive'">
                                    </button>
                                </form>
                            </td>

                            <!-- ACTIONS -->
                            <td>
                                <div class="btn-group" role="group">

                                    <!-- EDIT -->
                                    <a th:href="@{/admin/products/{id}/edit(id=${product.id})}"
                                       class="btn btn-sm btn-outline-primary">
                                        <i class="bi bi-pencil"></i>
                                    </a>

                                    <!-- DELETE -->
                                    <button type="button"
                                            class="btn btn-sm btn-outline-danger"
                                            data-bs-toggle="modal"
                                            th:data-bs-target="'#deleteModal' + ${product.id}">
                                        <i class="bi bi-trash"></i>
                                    </button>

                                </div>

                                <!-- DELETE MODAL -->
                                <div class="modal fade"
                                     th:id="'deleteModal' + ${product.id}"
                                     tabindex="-1">

                                    <div class="modal-dialog">
                                        <div class="modal-content">

                                            <div class="modal-header">
                                                <h5 class="modal-title">
                                                    Confirm Delete
                                                </h5>
                                                <button type="button"
                                                        class="btn-close"
                                                        data-bs-dismiss="modal">
                                                </button>
                                            </div>

                                            <div class="modal-body">
                                                Are you sure you want to delete this product?
                                            </div>

                                            <div class="modal-footer">
                                                <button type="button"
                                                        class="btn btn-secondary"
                                                        data-bs-dismiss="modal">
                                                    Cancel
                                                </button>

                                                <form th:action="@{/admin/products/{id}/delete(id=${product.id})}"
                                                      method="post">
                                                    <button type="submit"
                                                            class="btn btn-danger">
                                                        Delete
                                                    </button>
                                                </form>
                                            </div>

                                        </div>
                                    </div>

                                </div>

                            </td>

                        </tr>

                        </tbody>
                    </table>

                    <!-- EMPTY -->
                    <div class="text-center py-5"
                         th:if="${products == null or products.isEmpty()}">

                        <i class="bi bi-inbox text-muted"
                           style="font-size: 3rem;"></i>

                        <p class="text-muted mt-3">
                            No products found
                        </p>

                        <a th:href="@{/admin/products/new}"
                           class="btn btn-primary">
                            <i class="bi bi-plus-circle"></i>
                            Add First Product
                        </a>

                    </div>

                </div>
            </div>
        </div>

    </div>
</main>

</html>
