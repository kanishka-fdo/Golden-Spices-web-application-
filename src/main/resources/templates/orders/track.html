<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main}, 'Track Order')}">
<main>
    <style>
        :root{--g:#c8841f;--gd:#8a5c0c;--gl:#e8a94a;--gp:#fdf4e3;--gpp:#f0d898;--dk:#1a1208;--bd:#3d2e14;--mu:#7a6444;--wh:#fff;--of:#faf7f2;--br:#e8dfc9;}
        .trk-wrap{max-width:820px;margin:0 auto;padding:36px 32px 72px;font-family:'Jost',sans-serif;}
        .trk-back{display:inline-flex;align-items:center;gap:7px;color:var(--mu);text-decoration:none;font-size:.84rem;font-weight:600;margin-bottom:24px;padding:8px 14px;border:1px solid var(--br);border-radius:8px;background:var(--wh);transition:.2s;}
        .trk-back:hover{color:var(--g);border-color:var(--g);background:var(--gp);}

        /* Summary card */
        .trk-summary{background:var(--wh);border:1px solid var(--br);border-radius:18px;padding:26px 30px;margin-bottom:24px;box-shadow:0 4px 20px rgba(0,0,0,.07);position:relative;overflow:hidden;}
        .trk-summary::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,var(--gd),var(--g),var(--gl));}
        .trk-order-num{font-family:'Cinzel',serif;font-size:1.3rem;font-weight:700;color:var(--dk);margin-bottom:5px;}
        .trk-meta{display:flex;gap:20px;flex-wrap:wrap;font-size:.83rem;color:var(--mu);margin-bottom:16px;}
        .trk-meta span{display:flex;align-items:center;gap:5px;}
        .trk-meta i{color:var(--g);}

        /* Status pill — class comes from status name e.g. class="PENDING trk-st" */
        .trk-st{display:inline-flex;align-items:center;gap:8px;border-radius:24px;padding:8px 18px;font-size:.82rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
        .trk-st-dot{width:9px;height:9px;border-radius:50%;}
        .PENDING         .trk-st-dot{background:#e67e22;}
        .PENDING         {background:#fff8f0;border:1.5px solid #f0c898;color:#8a5c0c;}
        .CONFIRMED       .trk-st-dot{background:#3a6adf;}
        .CONFIRMED       {background:#f0f4ff;border:1.5px solid #b8c8f5;color:#1a3a8a;}
        .PROCESSING      .trk-st-dot{background:var(--g);animation:blink 1.4s infinite;}
        .PROCESSING      {background:var(--gp);border:1.5px solid var(--gpp);color:var(--gd);}
        .SHIPPED         .trk-st-dot{background:#27ae60;animation:blink 1.4s infinite;}
        .SHIPPED         {background:#f0faf5;border:1.5px solid #a8e6c5;color:#1a5a30;}
        .OUT_FOR_DELIVERY .trk-st-dot{background:#1a7a46;animation:blink 1.4s infinite;}
        .OUT_FOR_DELIVERY{background:#edfaf3;border:1.5px solid #7dd4a0;color:#145a28;}
        .DELIVERED       .trk-st-dot{background:#1a5a30;}
        .DELIVERED       {background:#edfaf3;border:1.5px solid #7dd4a0;color:#145a28;}
        .CANCELLED       .trk-st-dot{background:#e74c3c;}
        .CANCELLED       {background:#fff4f4;border:1.5px solid #f5b8b8;color:#a31515;}
        @keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.5)}}

        .trk-info-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px;}
        .trk-info-box{background:var(--of);border:1px solid var(--br);border-radius:10px;padding:14px 16px;}
        .trk-info-lbl{font-size:.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--mu);font-weight:700;margin-bottom:5px;}
        .trk-info-val{font-size:.95rem;font-weight:700;color:var(--dk);display:flex;align-items:center;gap:7px;}
        .trk-info-val i{color:var(--g);}
        .trk-addr-box{background:var(--gp);border:1px solid var(--gpp);border-radius:12px;padding:16px 18px;margin-top:18px;}
        .trk-addr-lbl{font-size:.68rem;letter-spacing:2px;text-transform:uppercase;color:var(--gd);font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
        .trk-addr-val{font-size:.9rem;color:var(--dk);line-height:1.65;}

        /* Timeline card */
        .trk-tl-card{background:var(--wh);border:1px solid var(--br);border-radius:18px;padding:28px 32px;box-shadow:0 4px 20px rgba(0,0,0,.07);}
        .trk-tl-title{font-family:'Cinzel',serif;font-size:1rem;font-weight:700;color:var(--dk);margin-bottom:28px;display:flex;align-items:center;gap:9px;padding-bottom:14px;border-bottom:1px solid var(--br);}
        .trk-tl-title i{color:var(--g);}

        /* Progress steps */
        .ps-row{display:flex;justify-content:space-between;margin-bottom:28px;position:relative;}
        .ps-row::before{content:'';position:absolute;top:18px;left:18px;right:18px;height:2px;background:var(--br);z-index:0;}
        .ps-step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative;z-index:1;}
        .ps-dot{width:36px;height:36px;border-radius:50%;border:2px solid var(--br);background:var(--of);display:flex;align-items:center;justify-content:center;color:var(--mu);font-size:.8rem;margin-bottom:6px;}
        .ps-dot.done  {background:linear-gradient(135deg,var(--gd),var(--g));border-color:var(--g);color:#fff;box-shadow:0 3px 10px rgba(200,132,31,.30);}
        .ps-dot.active{background:var(--wh);border-color:var(--g);color:var(--g);box-shadow:0 0 0 4px rgba(200,132,31,.15);}
        .ps-lbl{font-size:.6rem;text-transform:uppercase;letter-spacing:1px;color:var(--mu);text-align:center;font-weight:600;white-space:nowrap;}
        .ps-step.done .ps-lbl,.ps-step.active .ps-lbl{color:var(--g);font-weight:700;}

        /* Timeline events */
        .timeline{display:flex;flex-direction:column;}
        .tl-item{display:flex;gap:16px;padding-bottom:24px;position:relative;}
        .tl-item:last-child{padding-bottom:0;}
        .tl-left{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:34px;}
        .tl-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.82rem;border:2px solid var(--g);background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;box-shadow:0 3px 12px rgba(200,132,31,.30);flex-shrink:0;z-index:1;}
        .tl-line{flex:1;width:2px;background:linear-gradient(180deg,var(--g),rgba(200,132,31,.2));margin-top:3px;}
        .tl-content{padding-top:5px;}
        .tl-title{font-weight:700;color:var(--dk);font-size:.92rem;margin-bottom:3px;}
        .tl-desc{font-size:.83rem;color:var(--mu);line-height:1.6;}
        .tl-time{font-size:.74rem;color:var(--gl);font-weight:600;margin-top:5px;display:flex;align-items:center;gap:5px;}

        @media(max-width:600px){
            .trk-info-row{grid-template-columns:1fr;}
            .trk-wrap{padding:20px 14px 52px;}
            .trk-tl-card{padding:20px 16px;}
            .ps-lbl{font-size:.52rem;}
        }
    </style>

    <div class="trk-wrap">

        <a th:href="@{/orders}" class="trk-back"><i class="bi bi-arrow-left"></i> My Orders</a>

        <!-- ── Summary ── -->
        <div class="trk-summary">
            <div class="trk-order-num" th:text="${order.orderNumber}">ORD-000</div>
            <div class="trk-meta">
                <span>
                    <i class="bi bi-calendar3"></i>
                    <span th:text="${#temporals.format(order.createdAt,'dd MMM yyyy')}">Date</span>
                </span>
                <span>
                    <i class="bi bi-bag"></i>
                    <!--
                      order.items is fetched via @EntityGraph — safe to call size().
                    -->
                    <span th:text="${#lists.size(order.items)} + ' item(s)'">0</span>
                </span>
                <span>
                    <i class="bi bi-currency-exchange"></i>
                    LKR <span th:text="${#numbers.formatDecimal(order.totalAmount,1,'COMMA',2,'POINT')}">0</span>
                </span>
            </div>
            <!-- Status pill: class is the status name itself e.g. "PENDING trk-st" -->
            <div th:class="${order.status.name()} + ' trk-st'">
                <span class="trk-st-dot"></span>
                <span th:text="${order.status}">STATUS</span>
            </div>
            <div class="trk-info-row">
                <div class="trk-info-box">
                    <div class="trk-info-lbl">Estimated Delivery</div>
                    <div class="trk-info-val">
                        <i class="bi bi-calendar-check"></i>
                        <span th:text="${order.estimatedDelivery != null}
                            ? ${#temporals.format(order.estimatedDelivery,'EEE, dd MMM yyyy')}
                            : 'To be confirmed'">ETA</span>
                    </div>
                </div>
                <div class="trk-info-box">
                    <div class="trk-info-lbl">Current Location</div>
                    <div class="trk-info-val">
                        <i class="bi bi-geo-alt-fill"></i>
                        <span th:text="${order.currentLocation != null}
                            ? ${order.currentLocation}
                            : 'Not yet updated'">Location</span>
                    </div>
                </div>
            </div>
            <div class="trk-addr-box">
                <div class="trk-addr-lbl"><i class="bi bi-house-fill"></i> Delivering To</div>
                <div class="trk-addr-val" th:text="${order.deliveryAddress}">Address</div>
            </div>
        </div>

        <!-- ── Timeline card ── -->
        <div class="trk-tl-card">
            <div class="trk-tl-title"><i class="bi bi-clock-history"></i> Tracking History</div>

            <!--
              Progress bar — 5 visual steps covering all 7 enum values:
              PENDING → CONFIRMED → PROCESSING → SHIPPED → (OUT_FOR_DELIVERY) → DELIVERED

              OUT_FOR_DELIVERY is treated as "active" on the Delivered step since it is
              the last mile before delivery completes.
            -->
            <div class="ps-row" th:with="s=${order.status.name()}">

                <!-- 1. Placed -->
                <div th:class="'ps-step '
                  + (${#strings.equals(s,'PENDING')} ? 'active'
                  : 'done')">
                    <div th:class="'ps-dot '
                      + (${#strings.equals(s,'PENDING')} ? 'active' : 'done')">
                        <i class="bi bi-check-lg"></i>
                    </div>
                    <div class="ps-lbl">Placed</div>
                </div>

                <!-- 2. Confirmed -->
                <div th:class="'ps-step '
                  + (${#strings.equals(s,'CONFIRMED')} ? 'active'
                  : (${#strings.equals(s,'PROCESSING') or #strings.equals(s,'SHIPPED')
                     or #strings.equals(s,'OUT_FOR_DELIVERY') or #strings.equals(s,'DELIVERED')} ? 'done' : ''))">
                    <div th:class="'ps-dot '
                      + (${#strings.equals(s,'CONFIRMED')} ? 'active'
                      : (${#strings.equals(s,'PROCESSING') or #strings.equals(s,'SHIPPED')
                         or #strings.equals(s,'OUT_FOR_DELIVERY') or #strings.equals(s,'DELIVERED')} ? 'done' : ''))">
                        <i class="bi bi-check-lg"></i>
                    </div>
                    <div class="ps-lbl">Confirmed</div>
                </div>

                <!-- 3. Processing -->
                <div th:class="'ps-step '
                  + (${#strings.equals(s,'PROCESSING')} ? 'active'
                  : (${#strings.equals(s,'SHIPPED') or #strings.equals(s,'OUT_FOR_DELIVERY')
                     or #strings.equals(s,'DELIVERED')} ? 'done' : ''))">
                    <div th:class="'ps-dot '
                      + (${#strings.equals(s,'PROCESSING')} ? 'active'
                      : (${#strings.equals(s,'SHIPPED') or #strings.equals(s,'OUT_FOR_DELIVERY')
                         or #strings.equals(s,'DELIVERED')} ? 'done' : ''))">
                        <i class="bi bi-gear"></i>
                    </div>
                    <div class="ps-lbl">Processing</div>
                </div>

                <!-- 4. Shipped -->
                <div th:class="'ps-step '
                  + (${#strings.equals(s,'SHIPPED')} ? 'active'
                  : (${#strings.equals(s,'OUT_FOR_DELIVERY') or #strings.equals(s,'DELIVERED')} ? 'done' : ''))">
                    <div th:class="'ps-dot '
                      + (${#strings.equals(s,'SHIPPED')} ? 'active'
                      : (${#strings.equals(s,'OUT_FOR_DELIVERY') or #strings.equals(s,'DELIVERED')} ? 'done' : ''))">
                        <i class="bi bi-truck"></i>
                    </div>
                    <div class="ps-lbl">Shipped</div>
                </div>

                <!-- 5. Delivered (OUT_FOR_DELIVERY = active; DELIVERED = done) -->
                <div th:class="'ps-step '
                  + (${#strings.equals(s,'OUT_FOR_DELIVERY')} ? 'active'
                  : (${#strings.equals(s,'DELIVERED')} ? 'done' : ''))">
                    <div th:class="'ps-dot '
                      + (${#strings.equals(s,'OUT_FOR_DELIVERY')} ? 'active'
                      : (${#strings.equals(s,'DELIVERED')} ? 'done' : ''))">
                        <i class="bi bi-house"></i>
                    </div>
                    <div class="ps-lbl">Delivered</div>
                </div>

            </div>
            <!-- end ps-row -->

            <!-- Cancelled alert -->
            <div th:if="${#strings.equals(order.status.name(), 'CANCELLED')}"
                 style="text-align:center;padding:14px 20px;background:#fff4f4;border:1px solid #f5b8b8;border-radius:10px;color:#a31515;font-weight:700;margin-bottom:20px;font-size:.88rem;">
                <i class="bi bi-x-circle me-2"></i>This order has been cancelled.
            </div>

            <!-- Events -->
            <div class="timeline" th:if="${!#lists.isEmpty(trackingEvents)}">
                <div th:each="ev,st : ${trackingEvents}" class="tl-item">
                    <div class="tl-left">
                        <div class="tl-dot"><i class="bi bi-check-lg"></i></div>
                        <div th:unless="${st.last}" class="tl-line"></div>
                    </div>
                    <div class="tl-content">
                        <div class="tl-title" th:text="${ev.title}">Title</div>
                        <div class="tl-desc"  th:text="${ev.description}">Desc</div>
                        <div class="tl-time">
                            <i class="bi bi-clock"></i>
                            <span th:text="${#temporals.format(ev.createdAt,'dd MMM yyyy, hh:mm a')}">Time</span>
                        </div>
                    </div>
                </div>
            </div>

            <div th:if="${#lists.isEmpty(trackingEvents)}"
                 style="text-align:center;padding:28px;color:var(--mu);font-size:.88rem;">
                <i class="bi bi-hourglass"
                   style="font-size:1.8rem;display:block;margin-bottom:10px;color:#d8cbb8"></i>
                No tracking events yet.
            </div>
        </div>
        <!-- end trk-tl-card -->

        <!-- Auto-refresh every 60 seconds -->
        <script>setTimeout(() => location.reload(), 60_000);</script>

    </div>
</main>
</html>
