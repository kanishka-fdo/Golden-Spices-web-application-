<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="layout/base :: layout(~{::content}, 'Wholesale')">

<div th:fragment="content" class="container py-5">

  <h2>Place Wholesale Order</h2>

  <form th:action="@{/wholesale/order}" method="post" class="mt-4">

    <div class="mb-3">
      <label>Product Name</label>
      <input type="text" name="productName" class="form-control" required>
    </div>

    <div class="mb-3">
      <label>Quantity</label>
      <input type="number" name="quantity" class="form-control" required>
    </div>

    <button class="btn btn-warning">Submit Wholesale Order</button>

  </form>

</div>
</html>
