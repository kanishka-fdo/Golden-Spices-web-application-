<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main}, 'Wholesale Order Detail')}">

<main>
  <div class="container py-4">

    <h3 class="mb-4">Wholesale Order Detail</h3>

    <div class="card shadow-sm">
      <div class="card-body">

        <p><strong>Product:</strong>
          <span th:text="${order.productName}"></span>
        </p>

        <p><strong>Quantity:</strong>
          <span th:text="${order.quantity}"></span>
        </p>

        <p><strong>Total:</strong>
          LKR <span th:text="${order.totalAmount}"></span>
        </p>

        <p><strong>Status:</strong>
          <span th:text="${order.status}"></span>
        </p>

        <p><strong>Payment:</strong>
          <span th:text="${order.paymentStatus}"></span>
        </p>

      </div>
    </div>

  </div>
</main>
</html>
