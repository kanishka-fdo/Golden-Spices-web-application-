<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main}, 'Sign In — GOLDEN')}">

<main>
    <style>
        :root{--g:#c8841f;--gd:#8a5c0c;--gl:#e8a94a;--gp:#fdf4e3;--gpp:#f0d898;--dk:#1a1208;--bd:#3d2e14;--mu:#7a6444;--wh:#fff;--of:#faf7f2;--br:#e8dfc9;}
        .auth-page{min-height:calc(100vh - 160px);display:flex;align-items:center;justify-content:center;padding:40px 20px;font-family:'Jost',sans-serif;background:var(--of);position:relative;overflow:hidden;}
        /* Decorative background circles */
        .auth-page::before{content:'';position:absolute;top:-100px;right:-100px;width:400px;height:400px;border-radius:50%;border:1px solid rgba(200,132,31,.08);pointer-events:none;}
        .auth-page::after{content:'';position:absolute;bottom:-80px;left:-80px;width:320px;height:320px;border-radius:50%;border:1px solid rgba(200,132,31,.06);pointer-events:none;}

        /* Card */
        .auth-card{background:var(--wh);border-radius:22px;box-shadow:0 20px 60px rgba(0,0,0,.12),0 4px 16px rgba(0,0,0,.07);width:100%;max-width:440px;overflow:hidden;position:relative;z-index:1;}

        /* Card top accent */
        .auth-card-top{background:linear-gradient(135deg,var(--gd),var(--g),var(--gl));padding:36px 40px 32px;text-align:center;position:relative;overflow:hidden;}
        .auth-card-top::before{content:'';position:absolute;top:-40px;right:-40px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.08);}
        .auth-card-top::after{content:'';position:absolute;bottom:-30px;left:-30px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.06);}
        .auth-icon{width:64px;height:64px;background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.35);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:1.7rem;color:#fff;position:relative;z-index:1;}
        .auth-title{font-family:'Cinzel',serif;font-size:1.55rem;font-weight:700;color:#fff;margin-bottom:6px;letter-spacing:.5px;position:relative;z-index:1;}
        .auth-sub{font-size:.88rem;color:rgba(255,255,255,.75);position:relative;z-index:1;}

        /* Card body */
        .auth-body{padding:32px 40px 36px;}

        /* Alerts */
        .auth-alert{display:flex;align-items:flex-start;gap:11px;padding:13px 16px;border-radius:10px;margin-bottom:22px;font-size:.88rem;font-weight:500;animation:slideDown .3s ease;}
        @keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
        .alert-err{background:#fff4f4;border:1px solid #f5b8b8;color:#a31515;}
        .alert-err i{color:#e74c3c;font-size:1rem;flex-shrink:0;margin-top:1px;}
        .alert-ok{background:#edfaf3;border:1px solid #a8e6c5;color:#1a7a46;}
        .alert-ok i{color:#27ae60;font-size:1rem;flex-shrink:0;margin-top:1px;}

        /* Form fields */
        .f-group{margin-bottom:20px;}
        .f-label{display:block;font-size:.76rem;font-weight:700;color:var(--bd);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;}
        .f-input-wrap{position:relative;}
        .f-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--mu);font-size:.95rem;pointer-events:none;transition:.2s;}
        .f-input{width:100%;padding:12px 42px 12px 42px;border:1.5px solid var(--br);border-radius:10px;font-size:.95rem;font-family:'Jost',sans-serif;color:var(--dk);background:var(--of);outline:none;transition:.25s;}
        .f-input:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(200,132,31,.12);background:var(--wh);}
        .f-input:focus ~ .f-icon,.f-input-wrap:focus-within .f-icon{color:var(--g);}
        /* Toggle password */
        .f-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--mu);font-size:.95rem;padding:2px 4px;transition:.2s;}
        .f-eye:hover{color:var(--g);}

        /* Validation states */
        .f-input.valid  {border-color:#27ae60;background:var(--wh);}
        .f-input.invalid{border-color:#e74c3c;background:#fff8f8;}
        .f-valid-icon{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:.9rem;display:none;}
        .f-input.valid   ~ .f-valid-icon.ok  {display:block;color:#27ae60;}
        .f-input.invalid ~ .f-valid-icon.err {display:block;color:#e74c3c;}
        .f-msg{font-size:.76rem;margin-top:6px;display:flex;align-items:center;gap:5px;min-height:18px;}
        .f-msg.ok {color:#27ae60;}
        .f-msg.err{color:#e74c3c;}
        .f-msg i{font-size:.78rem;}

        /* Remember me */
        .f-check{display:flex;align-items:center;gap:10px;margin-bottom:22px;}
        .f-check input[type=checkbox]{width:17px;height:17px;accent-color:var(--g);cursor:pointer;border-radius:4px;}
        .f-check label{font-size:.86rem;color:var(--mu);cursor:pointer;user-select:none;}

        /* Submit button */
        .btn-auth{width:100%;padding:13px;background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;border:none;border-radius:10px;font-size:.95rem;font-weight:700;font-family:'Jost',sans-serif;cursor:pointer;transition:.28s;letter-spacing:.3px;box-shadow:0 5px 18px rgba(200,132,31,.32);display:flex;align-items:center;justify-content:center;gap:9px;}
        .btn-auth:hover{background:linear-gradient(135deg,var(--g),var(--gl));transform:translateY(-1px);box-shadow:0 7px 24px rgba(200,132,31,.44);}
        .btn-auth:active{transform:translateY(0);}

        /* Divider */
        .auth-div{display:flex;align-items:center;gap:12px;margin:22px 0;color:var(--mu);font-size:.8rem;}
        .auth-div::before,.auth-div::after{content:'';flex:1;height:1px;background:var(--br);}

        /* Register link */
        .btn-auth-outline{width:100%;padding:12px;background:var(--wh);color:var(--g);border:1.5px solid var(--g);border-radius:10px;font-size:.92rem;font-weight:700;font-family:'Jost',sans-serif;cursor:pointer;transition:.25s;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:9px;}
        .btn-auth-outline:hover{background:var(--gp);color:var(--gd);}

        /* Demo box */
        .demo-box{background:var(--of);border:1px solid var(--br);border-radius:10px;padding:14px 16px;margin-top:22px;}
        .demo-box-title{font-size:.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--mu);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
        .demo-box-title i{color:var(--g);}
        .demo-cred{font-size:.82rem;color:var(--bd);line-height:1.7;}
        .demo-cred strong{color:var(--g);}

        @media(max-width:480px){.auth-body{padding:24px 24px 28px;}.auth-card-top{padding:28px 24px 24px;}}
    </style>

    <div class="auth-page">
        <div class="auth-card">

            <!-- Top gradient header -->
            <div class="auth-card-top">
                <div class="auth-icon"><i class="bi bi-gem"></i></div>
                <div class="auth-title">Welcome Back</div>
                <div class="auth-sub">Sign in to your Golden account</div>
            </div>

            <!-- Form body -->
            <div class="auth-body">

                <!-- Server error (wrong password) -->
                <div class="auth-alert alert-err" th:if="${param.error}">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span>Invalid email or password. Please try again.</span>
                </div>

                <!-- Logout success -->
                <div class="auth-alert alert-ok" th:if="${param.logout}">
                    <i class="bi bi-check-circle-fill"></i>
                    <span>You have been logged out successfully.</span>
                </div>

                <!-- Registration success -->
                <div class="auth-alert alert-ok" th:if="${success}">
                    <i class="bi bi-check-circle-fill"></i>
                    <span th:text="${success}">Success</span>
                </div>

                <!-- Login Form -->
                <form th:action="@{/auth/login}" method="post" id="loginForm" novalidate>

                    <!-- Email -->
                    <div class="f-group">
                        <label class="f-label" for="loginEmail">Email Address</label>
                        <div class="f-input-wrap">
                            <i class="bi bi-envelope f-icon"></i>
                            <input class="f-input" id="loginEmail" name="email" type="email"
                                   placeholder="your@email.com" required autocomplete="email" autofocus>
                            <i class="bi bi-check-circle f-valid-icon ok"></i>
                            <i class="bi bi-x-circle f-valid-icon err"></i>
                        </div>
                        <div class="f-msg" id="emailMsg"></div>
                    </div>

                    <!-- Password -->
                    <div class="f-group">
                        <label class="f-label" for="loginPassword">Password</label>
                        <div class="f-input-wrap">
                            <i class="bi bi-lock f-icon"></i>
                            <input class="f-input" id="loginPassword" name="password" type="password"
                                   placeholder="Enter your password" required autocomplete="current-password">
                            <button type="button" class="f-eye" id="togglePwd" tabindex="-1">
                                <i class="bi bi-eye" id="eyeIcon"></i>
                            </button>
                        </div>
                        <div class="f-msg" id="pwdMsg"></div>
                    </div>

                    <!-- Remember me -->
                    <div class="f-check">
                        <input type="checkbox" name="remember-me" id="rememberMe">
                        <label for="rememberMe">Keep me signed in for 7 days</label>
                    </div>

                    <button type="submit" class="btn-auth" id="loginBtn">
                        <i class="bi bi-box-arrow-in-right"></i> Sign In
                    </button>
                </form>

                <div class="auth-div">or</div>

                <a th:href="@{/auth/register}" class="btn-auth-outline">
                    <i class="bi bi-person-plus"></i> Create New Account
                </a>

                <!-- Demo credentials -->
                <div class="demo-box">
                    <div class="demo-box-title"><i class="bi bi-info-circle-fill"></i> Demo Admin Account</div>
                    <div class="demo-cred">
                        <strong>Email:</strong> admin@golden.lk<br>
                        <strong>Password:</strong> Admin@123
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        /* ── Real-time login validation ── */
        const emailInput = document.getElementById('loginEmail');
        const pwdInput   = document.getElementById('loginPassword');
        const emailMsg   = document.getElementById('emailMsg');
        const pwdMsg     = document.getElementById('pwdMsg');
        const loginBtn   = document.getElementById('loginBtn');
        const togglePwd  = document.getElementById('togglePwd');
        const eyeIcon    = document.getElementById('eyeIcon');

        /* Toggle password visibility */
        togglePwd.addEventListener('click', () => {
            const isText = pwdInput.type === 'text';
            pwdInput.type = isText ? 'password' : 'text';
            eyeIcon.className = isText ? 'bi bi-eye' : 'bi bi-eye-slash';
        });

        /* Email validation */
        function validateEmail() {
            const val = emailInput.value.trim();
            const re  = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!val) {
                setField(emailInput, emailMsg, 'err', 'Email address is required');
                return false;
            }
            if (!re.test(val)) {
                setField(emailInput, emailMsg, 'err', 'Please enter a valid email address');
                return false;
            }
            setField(emailInput, emailMsg, 'ok', 'Looks good!');
            return true;
        }

        /* Password validation */
        function validatePassword() {
            const val = pwdInput.value;
            if (!val) {
                setField(pwdInput, pwdMsg, 'err', 'Password is required');
                return false;
            }
            if (val.length < 6) {
                setField(pwdInput, pwdMsg, 'err', 'Password must be at least 6 characters');
                return false;
            }
            setField(pwdInput, pwdMsg, 'ok', '');
            return true;
        }

        /* Helper */
        function setField(input, msgEl, type, msg) {
            input.classList.remove('valid', 'invalid');
            input.classList.add(type === 'ok' ? 'valid' : 'invalid');
            msgEl.className = 'f-msg ' + (type === 'ok' ? 'ok' : 'err');
            msgEl.innerHTML = msg
                ? `<i class="bi bi-${type === 'ok' ? 'check' : 'exclamation-circle'}"></i>${msg}`
                : '';
        }

        /* Live validation */
        emailInput.addEventListener('blur',  validateEmail);
        emailInput.addEventListener('input', () => { if(emailInput.classList.contains('invalid')) validateEmail(); });
        pwdInput.addEventListener('blur',   validatePassword);
        pwdInput.addEventListener('input',  () => { if(pwdInput.classList.contains('invalid')) validatePassword(); });

        /* Submit validation */
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const emailOk = validateEmail();
            const pwdOk   = validatePassword();
            if (!emailOk || !pwdOk) {
                e.preventDefault();
                // Shake the button
                loginBtn.style.animation = 'shake .4s ease';
                setTimeout(() => loginBtn.style.animation = '', 400);
            } else {
                loginBtn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status"></span> Signing In...';
                loginBtn.disabled = true;
            }
        });
    </script>

    <style>
        @keyframes shake {
            0%,100%{transform:translateX(0)}
            20%    {transform:translateX(-8px)}
            40%    {transform:translateX(8px)}
            60%    {transform:translateX(-5px)}
            80%    {transform:translateX(5px)}
        }
    </style>
</main>
</html>
