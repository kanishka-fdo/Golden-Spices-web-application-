<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout/base :: layout(~{::main}, 'Our Products')}">

<main>
    <style>
        :root{--g:#c8841f;--gd:#8a5c0c;--gl:#e8a94a;--gp:#fdf4e3;--dk:#1a1208;--mu:#7a6444;--of:#faf7f2;--br:#e8dfc9;}
        .pl-wrap{max-width:1280px;margin:0 auto;padding:40px 40px 72px;font-family:'Jost',sans-serif;}

        /* ── Header ── */
        .pl-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:36px;flex-wrap:wrap;}
        .pl-title-tag{font-size:.65rem;letter-spacing:5px;text-transform:uppercase;color:var(--g);font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
        .pl-title-tag::before{content:'';width:28px;height:2px;background:linear-gradient(90deg,var(--gd),var(--g));border-radius:2px;}
        .pl-title{font-family:'Cinzel',serif;font-size:clamp(1.8rem,3vw,2.6rem);font-weight:700;color:var(--dk);letter-spacing:.5px;line-height:1.1;}
        .pl-title i{color:var(--g);margin-right:10px;}

        /* ── Search bar ── */
        .pl-search{display:flex;gap:0;border-radius:10px;overflow:hidden;border:1.5px solid var(--br);background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.06);max-width:380px;width:100%;}
        .pl-search input{flex:1;padding:11px 18px;border:none;outline:none;font-size:.92rem;font-family:'Jost',sans-serif;color:var(--dk);background:transparent;}
        .pl-search button{padding:11px 18px;background:var(--g);color:#fff;border:none;cursor:pointer;font-size:1rem;transition:.2s;}
        .pl-search button:hover{background:var(--gd);}

        /* ── Grid ── */
        .pl-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:28px;}

        /* ── Product Card ── */
        .pc{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 3px 18px rgba(0,0,0,.07);transition:.32s;border:1px solid var(--br);display:flex;flex-direction:column;}
        .pc:hover{transform:translateY(-7px);box-shadow:0 18px 48px rgba(0,0,0,.13);border-color:rgba(200,132,31,.22);}

        /* Image */
        .pc-iw{position:relative;overflow:hidden;}
        .pc-img{width:100%;height:220px;object-fit:cover;display:block;transition:transform .55s;}
        .pc:hover .pc-img{transform:scale(1.06);}
        .pc-stock{position:absolute;top:12px;left:12px;background:linear-gradient(135deg,#1a8a4a,#27ae60);color:#fff;font-size:.63rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 11px;border-radius:4px;}
        .pc-out{position:absolute;top:12px;left:12px;background:rgba(163,21,21,.88);color:#fff;font-size:.63rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 11px;border-radius:4px;}

        /* Body */
        .pc-bd{padding:18px 18px 0;flex:1;}
        .pc-brand{font-size:.62rem;letter-spacing:3.5px;text-transform:uppercase;color:var(--g);font-weight:700;margin-bottom:4px;}
        .pc-name{font-family:'Cinzel',serif;font-size:.95rem;font-weight:700;color:var(--dk);margin-bottom:6px;line-height:1.25;}
        .pc-size{font-size:.77rem;color:var(--mu);margin-bottom:10px;display:flex;align-items:center;gap:5px;}
        .pc-price{font-family:'Cinzel',serif;font-size:1.15rem;font-weight:700;color:var(--dk);margin-bottom:16px;}
        .pc-price small{font-size:.72rem;font-weight:500;color:var(--mu);font-family:'Jost',sans-serif;margin-right:2px;}

        /* Desc */
        .pc-desc{font-size:.82rem;color:var(--mu);line-height:1.65;margin-bottom:16px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

        /* Action buttons */
        .pc-actions{padding:0 18px 18px;display:flex;flex-direction:column;gap:8px;margin-top:auto;}
        .btn-cart{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px;background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.86rem;font-weight:700;font-family:'Jost',sans-serif;letter-spacing:.3px;transition:.25s;text-decoration:none;}
        .btn-cart:hover{background:linear-gradient(135deg,var(--g),var(--gl));color:#fff;box-shadow:0 4px 16px rgba(200,132,31,.38);}
        .btn-cart:disabled,.btn-cart.disabled{background:#d8d0c8;cursor:not-allowed;box-shadow:none;}
        .btn-review{display:flex;align-items:center;justify-content:center;gap:7px;width:100%;padding:9px;background:transparent;border:1.5px solid var(--br);border-radius:8px;cursor:pointer;font-size:.82rem;font-weight:600;font-family:'Jost',sans-serif;color:var(--mu);text-decoration:none;transition:.25s;}
        .btn-review:hover{border-color:var(--g);color:var(--g);background:var(--gp);}

        /* ── Empty state ── */
        .pl-empty{grid-column:1/-1;text-align:center;padding:72px 24px;background:var(--of);border-radius:16px;border:1px dashed var(--br);}
        .pl-empty i{font-size:3rem;color:#d8cbb8;margin-bottom:16px;display:block;}
        .pl-empty-t{font-family:'Cinzel',serif;font-size:1.2rem;color:var(--dk);margin-bottom:8px;}
        .pl-empty-s{font-size:.9rem;color:var(--mu);}

        @media(max-width:1100px){.pl-grid{grid-template-columns:repeat(3,1fr);}}
        @media(max-width:768px){.pl-grid{grid-template-columns:repeat(2,1fr);}.pl-head{flex-direction:column;align-items:flex-start;}.pl-wrap{padding:28px 20px 52px;}}
        @media(max-width:480px){.pl-grid{grid-template-columns:1fr;}}
    </style>

    <div class="pl-wrap">

        <!-- Header -->
        <div class="pl-head">
            <div>
                <div class="pl-title-tag">Golden Dissanayaka Distributors</div>
                <h1 class="pl-title"><i class="bi bi-grid-3x3-gap"></i>Our Products</h1>
            </div>
            <!-- Search -->
            <form th:action="@{/products}" method="get" class="pl-search">
                <input type="text" name="search" placeholder="Search spices..."
                       th:value="${search}" autocomplete="off">
                <button type="submit"><i class="bi bi-search"></i></button>
            </form>
        </div>

        <!-- Search result notice -->
        <div th:if="${search != null and !search.isBlank()}"
             style="margin-bottom:24px;padding:12px 18px;background:var(--gp);border:1px solid var(--gpp);border-radius:10px;font-size:.88rem;color:var(--gd);display:flex;align-items:center;gap:10px;">
            <i class="bi bi-search"></i>
            Showing results for "<strong th:text="${search}"></strong>"
            <a th:href="@{/products}" style="margin-left:auto;color:var(--g);font-weight:700;text-decoration:none;">
                <i class="bi bi-x"></i> Clear
            </a>
        </div>

        <!-- Product Grid -->
        <div class="pl-grid">

            <!-- Empty state -->
            <div class="pl-empty" th:if="${#lists.isEmpty(products)}">
                <i class="bi bi-search"></i>
                <div class="pl-empty-t">No Products Found</div>
                <p class="pl-empty-s" th:if="${search != null}">
                    No results for "<span th:text="${search}"></span>". Try a different search.
                </p>
                <p class="pl-empty-s" th:if="${search == null}">No products available at the moment.</p>
            </div>

            <!-- Product Cards -->
            <div class="pc" th:each="p : ${products}">

                <!-- Image -->
                <div class="pc-iw">
                    <img class="pc-img"
                         th:src="${p.imageUrl != null and !p.imageUrl.isBlank()}
                     ? (${p.imageUrl.startsWith('/images')} ? ${p.imageUrl} : '/images/products/' + ${p.imageUrl})
                     : '/images/products/default-product.png'"
                         th:alt="${p.name}">
                    <span class="pc-stock" th:if="${p.stockQty != null and p.stockQty > 0}">In Stock</span>
                    <span class="pc-out"   th:if="${p.stockQty == null or p.stockQty <= 0}">Out of Stock</span>
                </div>

                <!-- Body -->
                <div class="pc-bd">
                    <div class="pc-brand" th:text="${p.brand}">GOLDEN</div>
                    <div class="pc-name"  th:text="${p.name}">Product Name</div>
                    <div class="pc-size">
                        <i class="bi bi-box" style="color:var(--g)"></i>
                        <span th:text="${p.sizeLabel}">1kg</span>
                    </div>
                    <div class="pc-price">
                        <small>LKR </small>
                        <span th:text="${#numbers.formatDecimal(p.priceLkr,1,'COMMA',2,'POINT')}">0.00</span>
                    </div>
                    <div class="pc-desc" th:if="${p.description != null}" th:text="${p.description}"></div>
                </div>

                <!-- Actions -->
                <div class="pc-actions">
                    <!-- Add to Cart -->
                    <form th:action="@{/cart/add}" method="post" th:if="${p.stockQty != null and p.stockQty > 0}">
                        <input type="hidden" name="productId" th:value="${p.id}">
                        <input type="hidden" name="qty" value="1">
                        <button type="submit" class="btn-cart">
                            <i class="bi bi-cart-plus"></i>Add to Cart
                        </button>
                    </form>
                    <button class="btn-cart disabled" disabled
                            th:if="${p.stockQty == null or p.stockQty <= 0}">
                        <i class="bi bi-x-circle"></i>Out of Stock
                    </button>

                    <!-- Review Button -->
                    <a th:href="@{/products/{id}/reviews(id=${p.id})}" class="btn-review">
                        <i class="bi bi-star"></i>Reviews
                    </a>
                </div>

            </div>
            <!-- end each -->

        </div>
        <!-- end grid -->

    </div>
</main>
</html>
