<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout(~{::main}, 'Payment Cancelled')}">

<main>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow text-center">
                    <div class="card-body p-5">

                        <div class="text-warning mb-4">
                            <i class="bi bi-x-circle-fill" style="font-size:5rem;"></i>
                        </div>

                        <h3 class="fw-bold mb-2">Payment Cancelled</h3>
                        <p class="text-muted mb-4">
                            Your payment was cancelled. Your cart items are still saved —
                            you can complete your order anytime.
                        </p>

                        <div class="d-grid gap-2">
                            <a th:href="@{/cart}" class="btn btn-primary rounded-pill">
                                <i class="bi bi-cart3 me-2"></i>Return to Cart
                            </a>
                            <a th:href="@{/products}" class="btn btn-outline-secondary rounded-pill">
                                <i class="bi bi-shop me-1"></i>Continue Shopping
                            </a>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

</html>
