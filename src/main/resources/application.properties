# ==================================================
# DATABASE CONFIGURATION (SQL SERVER)
# ==================================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=GoldenSpicesDB;encrypt=false;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=kanishka123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# ==================================================
# JPA / HIBERNATE
# ==================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Prevent lazy loading issues
spring.jpa.open-in-view=false

# ==================================================
# STATIC RESOURCES
# ==================================================
spring.web.resources.static-locations=classpath:/static/

# ==================================================
# STRIPE CONFIGURATION
# ==================================================
stripe.secretKey=sk_test_REPLACE_WITH_YOUR_KEY
app.baseUrl=http://localhost:8080

# ==================================================
# SERVER CONFIGURATION
# ==================================================
server.port=8080
server.error.whitelabel.enabled=false

# ==================================================
# LOGGING
# ==================================================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.springframework.security=INFO

# ==================================================
# HIKARI CONNECTION POOL
# ==================================================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=GoldenSpicesPool